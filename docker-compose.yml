services:
  api:
    build: .
    command: uvicorn smart_replenishment.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    restart: always

  dashboard:
    build: .
    command: streamlit run src/smart_replenishment/dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    depends_on:
      - api
    restart: always
