services:
  api:
    image: smart-replenishment:${IMAGE_TAG:-latest}
    container_name: smart_replenishment_api
    command: uvicorn smart_replenishment.api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./data/processed:/app/data/processed:ro
    restart: unless-stopped
    mem_limit: 320m
    healthcheck:
      test:
        ["CMD", "python", "-c", "import json, urllib.request; d=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)); assert d['status'] == 'ok' and d['forecast_data_loaded'] and d['priorities_data_loaded']"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - caddy

  dashboard:
    image: smart-replenishment:${IMAGE_TAG:-latest}
    container_name: smart_replenishment_dashboard
    command: streamlit run src/smart_replenishment/dashboard/app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
    volumes:
      - ./data/processed:/app/data/processed:ro
    restart: unless-stopped
    mem_limit: 420m
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - caddy

networks:
  caddy:
    external: true
    name: fitmentor_default
